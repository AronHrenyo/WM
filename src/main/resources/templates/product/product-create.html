<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: commonHead('Create Product')}"></head>
<body>
<!-- Navbar -->
<div th:replace="~{fragments :: navbar}"></div>

<div class="container mt-5">
    <h1 class="mb-4">Create New Product</h1>

    <form th:action="@{/product-create}" th:object="${product}" method="post">
        <div class="mb-3">
            <label for="sku" class="form-label">Product SKU</label>
            <input type="text" th:field="*{productSku}" class="form-control" id="sku" placeholder="Enter product SKU" required>
        </div>

        <div class="mb-3">
            <label for="name" class="form-label">Product Name</label>
            <input type="text" th:field="*{productName}" class="form-control" id="name" placeholder="Enter product name" required>
        </div>

        <div class="mb-3">
            <label for="category" class="form-label">Category</label>
            <input type="text" th:field="*{productCategory}" class="form-control" id="category" placeholder="Enter category">
        </div>

        <div class="mb-3">
            <label for="purchasePrice" class="form-label">Purchase Price</label>
            <input type="number" step="0.01" th:field="*{productPurchasePrice}" class="form-control" id="purchasePrice" placeholder="Enter purchase price">
        </div>

        <div class="mb-3">
            <label for="salesPrice" class="form-label">Sales Price</label>
            <input type="number" step="0.01" th:field="*{productSalesPrice}" class="form-control" id="salesPrice" placeholder="Enter sales price">
        </div>

        <div class="mb-3">
            <label for="vatKey" class="form-label">VAT Key</label>
            <input type="number" th:field="*{productVatKey}" class="form-control" id="vatKey" placeholder="Enter VAT key">
        </div>

        <button type="submit" class="btn btn-primary">Save Product</button>
        <a th:href="@{/product-view}" class="btn btn-secondary ms-2">Back to List</a>
    </form>
</div>

<!-- Footer -->
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
