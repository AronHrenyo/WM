<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: commonHead('Create Partner')}"></head>
<body>
<!-- Navbar -->
<div th:replace="~{fragments :: navbar}"></div>

<div class="container mt-5">
    <h1 class="mb-4">Create New Partner</h1>

    <form th:action="@{/partner-create}" th:object="${partner}" method="post">
        <div class="mb-3">
            <label for="name" class="form-label">Partner Name</label>
            <input type="text" th:field="*{partnerName}" class="form-control" id="name" placeholder="Enter partner name" required>
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" th:field="*{partnerEmail}" class="form-control" id="email" placeholder="Enter email">
        </div>

        <div class="mb-3">
            <label for="telephone" class="form-label">Telephone</label>
            <input type="text" th:field="*{partnerTelephone}" class="form-control" id="telephone" placeholder="Enter telephone number">
        </div>

        <div class="mb-3">
            <label for="address" class="form-label">Address</label>
            <input type="text" th:field="*{partnerAddress}" class="form-control" id="address" placeholder="Enter address">
        </div>

        <button type="submit" class="btn btn-primary">Save Partner</button>
        <a th:href="@{/partner-view}" class="btn btn-secondary ms-2">Back to List</a>
    </form>
</div>

<!-- Footer -->
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
