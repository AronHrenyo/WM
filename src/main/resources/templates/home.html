<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: commonHead('Warehouse Management System')}"></head>
<body>
<!-- Navbar -->
<div th:replace="~{fragments :: navbar}"></div>

    <div class="container mt-5">
        <!-- Navigation Cards -->
        <div class="row g-4">

            <!-- PURCHASE -->
            <div class="col-md-3">
                <h5 class="text-center mb-3">Purchase</h5>

                <div class="card shadow-sm mb-3">
                    <div class="card-body text-center">
                        <h6 class="card-title">Purchase Orders</h6>
                        <a href="/purchase-order-view" class="btn btn-primary btn-sm">View</a>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body text-center">
                        <h6 class="card-title">Create Order</h6>
                        <a href="/purchase-order-create" class="btn btn-success btn-sm">Create</a>
                    </div>
                </div>
            </div>

            <!-- SALES -->
            <div class="col-md-3">
                <h5 class="text-center mb-3">Sales</h5>

                <div class="card shadow-sm mb-3">
                    <div class="card-body text-center">
                        <h6 class="card-title">Sales Orders</h6>
                        <a href="/sales-order-view" class="btn btn-primary btn-sm">View</a>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body text-center">
                        <h6 class="card-title">Create Order</h6>
                        <a href="/sales-order-create" class="btn btn-success btn-sm">Create</a>
                    </div>
                </div>
            </div>

            <!-- INVOICES -->
            <div class="col-md-3">
                <h5 class="text-center mb-3">Invoices</h5>

                <div class="card shadow-sm mb-3">
                    <div class="card-body text-center">
                        <h6 class="card-title">Invoices</h6>
                        <a href="/invoice-view" class="btn btn-primary btn-sm">View</a>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body text-center">
                        <h6 class="card-title">Create Invoice</h6>
                        <a href="/invoice-create" class="btn btn-success btn-sm">Create</a>
                    </div>
                </div>
            </div>

            <!-- MASTER DATA -->
            <div class="col-md-3">
                <h5 class="text-center mb-3">Master Data</h5>

                <div class="card shadow-sm mb-3">
                    <div class="card-body text-center">
                        <h6 class="card-title">Partners</h6>
                        <a href="/partner-view" class="btn btn-primary btn-sm">View</a>
                    </div>
                </div>

                <div class="card shadow-sm mb-3">
                    <div class="card-body text-center">
                        <h6 class="card-title">Create Partner</h6>
                        <a href="/partner-create" class="btn btn-success btn-sm">Create</a>
                    </div>
                </div>

                <div class="card shadow-sm mb-3">
                    <div class="card-body text-center">
                        <h6 class="card-title">Products</h6>
                        <a href="/product-view" class="btn btn-primary btn-sm">View</a>
                    </div>
                </div>

                <div class="card shadow-sm mb-3">
                    <div class="card-body text-center">
                        <h6 class="card-title">Create Product</h6>
                        <a href="/product-create" class="btn btn-success btn-sm">Create</a>
                    </div>
                </div>
            </div>

        <!-- WAREHOUSE -->
        <div class="col-md-3">
            <h5 class="text-center mb-3">Warehouse</h5>
            <div class="card shadow-sm mb-3">
                <div class="card-body text-center">
                    <h6 class="card-title">Warehouses</h6>
                    <a href="/warehouse-map" class="btn btn-primary btn-sm">View</a>
                </div>
            </div>
                <div class="card shadow-sm">
                    <div class="card-body text-center">
                        <h6 class="card-title">Inventory</h6>
                        <a href="#" class="btn btn-secondary btn-sm disabled">Coming Soon</a>
                    </div>
                </div>
            </div>

    </div>

<!-- Footer -->
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
